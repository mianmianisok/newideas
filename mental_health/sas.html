<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焦虑自评量表 (SAS)</title>
<style>
  :root {
    --primary: #5B8FF9;
    --primary-light: #7DA4FA;
    --bg: #F0F2F5;
    --card: #FFFFFF;
    --text: #1F2937;
    --text-light: #6B7280;
    --border: #E5E7EB;
    --green: #34D399;
    --yellow: #FBBF24;
    --orange: #F97316;
    --red: #EF4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 16px; }

  .header {
    background: linear-gradient(135deg, #5B8FF9, #3B6FD4);
    color: white; border-radius: 12px; padding: 28px 24px; margin-bottom: 16px; text-align: center;
  }
  .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 13px; opacity: .85; }
  .back-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: white; text-decoration: none; font-size: 13px; margin-bottom: 12px; opacity: .9;
  }
  .back-link:hover { opacity: 1; }

  /* Progress */
  .progress-wrap {
    background: var(--card); border-radius: 10px; padding: 14px 18px;
    margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text-light); margin-bottom: 6px;
  }
  .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 3px; transition: width .3s; width: 0%;
  }

  /* Single question card */
  .q-area { display: none; animation: slideIn .3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }

  .q-card {
    background: var(--card); border-radius: 14px; padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 20px;
  }
  .q-card .q-head {
    display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px;
  }
  .q-num {
    background: var(--primary); color: #fff; min-width: 32px; height: 32px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .q-card.rev .q-num { background: var(--orange); }
  .q-text { font-size: 17px; font-weight: 500; flex: 1; line-height: 1.6; padding-top: 4px; }
  .rev-tag {
    font-size: 11px; background: #FFF7ED; color: #C2410C;
    padding: 2px 8px; border-radius: 4px; margin-left: 8px; font-weight: 400; white-space: nowrap;
  }

  /* Options */
  .opts { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .opt {
    text-align: center; padding: 14px 4px; border: 2px solid var(--border);
    border-radius: 12px; cursor: pointer; transition: all .15s; user-select: none; background: #fff;
  }
  .opt:hover { border-color: var(--primary-light); background: #F0F5FF; }
  .opt.sel { border-color: var(--primary); background: #EBF2FF; }
  .opt .o-letter { font-size: 15px; font-weight: 600; color: var(--primary); }
  .opt .o-text { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .opt.sel .o-text { color: var(--primary); }

  /* Nav buttons */
  .nav-btns {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .2s; border: none;
  }
  .nav-prev {
    background: #fff; color: var(--text-light); border: 1.5px solid var(--border);
  }
  .nav-prev:hover { border-color: var(--primary); color: var(--primary); }
  .nav-prev:disabled { opacity: .3; cursor: not-allowed; }
  .nav-next {
    background: linear-gradient(135deg, var(--primary), #3B6FD4);
    color: #fff; box-shadow: 0 3px 12px rgba(91,143,249,.3);
  }
  .nav-next:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(91,143,249,.45); }
  .nav-next:disabled { background: #9CA3AF; box-shadow: none; cursor: not-allowed; transform: none; }
  .nav-submit {
    background: linear-gradient(135deg, #34D399, #059669);
    color: #fff; box-shadow: 0 3px 12px rgba(52,211,153,.3);
  }
  .nav-submit:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(52,211,153,.45); }

  .nav-center { font-size: 13px; color: var(--text-light); }

  /* Unanswered list */
  .unanswered {
    background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .unanswered h4 { font-size: 13px; color: #B91C1C; margin-bottom: 8px; }
  .unanswered .ua-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .unanswered .ua-item {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; height: 28px; border-radius: 6px;
    background: #fff; border: 1px solid #FCA5A5; color: #B91C1C;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .unanswered .ua-item:hover { background: #B91C1C; color: #fff; }

  /* Result */
  .result { display: none; animation: fadeUp .4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .res-card {
    background: var(--card); border-radius: 14px; padding: 28px 20px;
    text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 16px;
  }
  .ring { width: 150px; height: 150px; margin: 0 auto 16px; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .ring .sc { position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); text-align: center; }
  .sc-num { font-size: 36px; font-weight: 700; line-height: 1; }
  .sc-unit { font-size: 12px; color: var(--text-light); }
  .res-level { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .res-desc { font-size: 13px; color: var(--text-light); max-width: 460px; margin: 0 auto; line-height: 1.7; }

  .detail-card {
    background: var(--card); border-radius: 10px; padding: 18px;
    box-shadow: 0 1px 6px rgba(0,0,0,.05); margin-bottom: 16px;
  }
  .detail-card h3 { font-size: 15px; margin-bottom: 12px; }
  .d-row {
    display: flex; justify-content: space-between; padding: 7px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .d-row:last-child { border-bottom: none; }
  .d-row .dl { color: var(--text-light); }
  .d-row .dv { font-weight: 600; }

  .disclaimer {
    background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px;
    padding: 14px; font-size: 12px; color: #92400E; line-height: 1.7;
  }
  .disclaimer strong { display: block; margin-bottom: 4px; }

  .restart-btn {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 16px; padding: 8px 24px; background: #fff;
    color: var(--primary); border: 1.5px solid var(--primary); border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .restart-btn:hover { background: var(--primary); color: #fff; }

  @media(max-width:480px) {
    .opts { grid-template-columns: repeat(2,1fr); }
    .header h1 { font-size: 19px; }
    .nav-btn { padding: 10px 20px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-link">← 返回首页</a>
    <h1>焦虑自评量表 (SAS)</h1>
    <p>Zung 焦虑自评量表 · 20 题 · 约 5 分钟</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span>答题进度</span>
      <span id="pText">1 / 20</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="pFill"></div></div>
  </div>

  <div class="q-area" id="qArea">
    <div class="q-card" id="qCard">
      <div class="q-head">
        <span class="q-num" id="qNum">1</span>
        <span class="q-text" id="qText"></span>
      </div>
      <div class="opts" id="qOpts"></div>
    </div>

    <div class="nav-btns">
      <button class="nav-btn nav-prev" id="btnPrev" onclick="goPrev()">← 上一题</button>
      <span class="nav-center" id="navCenter"></span>
      <button class="nav-btn nav-next" id="btnNext" onclick="goNext()">下一题 →</button>
    </div>
    <div class="unanswered" id="unanswered" style="display:none">
      <h4>⚠️ 以下题目尚未作答，点击可跳转：</h4>
      <div class="ua-list" id="uaList"></div>
    </div>
  </div>

  <div class="result" id="resSection">
    <div class="res-card">
      <div class="ring">
        <svg width="150" height="150">
          <circle cx="75" cy="75" r="65" fill="none" stroke="#E5E7EB" stroke-width="8"/>
          <circle cx="75" cy="75" r="65" fill="none" stroke-width="8" stroke-linecap="round"
                  id="sCircle" stroke-dasharray="408.4" stroke-dashoffset="408.4"/>
        </svg>
        <div class="sc">
          <div class="sc-num" id="scNum">--</div>
          <div class="sc-unit">标准分</div>
        </div>
      </div>
      <div class="res-level" id="resLevel">--</div>
      <div class="res-desc" id="resDesc"></div>
    </div>

    <div class="detail-card">
      <h3>评分详情</h3>
      <div class="d-row"><span class="dl">粗分（原始分）</span><span class="dv" id="dRaw">--</span></div>
      <div class="d-row"><span class="dl">标准分（粗分×1.25 取整）</span><span class="dv" id="dStd">--</span></div>
      <div class="d-row"><span class="dl">焦虑程度</span><span class="dv" id="dLev">--</span></div>
    </div>

    <div class="disclaimer">
      <strong>⚠️ 免责声明</strong>
      本量表仅作为焦虑情绪的自我筛查参考工具，不能替代专业医疗诊断。如您持续感到焦虑或不适，请及时前往正规医院精神科或心理科就诊。
    </div>
    <div style="text-align:center"><button class="restart-btn" onclick="restart()">↺ 重新测评</button></div>
  </div>
</div>

<script>
const QS = [
  {id:1, t:"我觉得比平常容易紧张和着急",r:false},
  {id:2, t:"我无缘无故地感到害怕",r:false},
  {id:3, t:"我容易心里烦乱或觉得惊恐",r:false},
  {id:4, t:"我觉得我可能将要发疯",r:false},
  {id:5, t:"我觉得一切都很好，也不会发生什么不幸",r:true},
  {id:6, t:"我手脚发抖打颤",r:false},
  {id:7, t:"我因为头痛、颈痛和背痛而苦恼",r:false},
  {id:8, t:"我感觉容易衰弱和疲乏",r:false},
  {id:9, t:"我觉得心平气和，并且容易安静坐着",r:true},
  {id:10,t:"我觉得心跳得很快",r:false},
  {id:11,t:"我因为一阵阵头晕而苦恼",r:false},
  {id:12,t:"我有晕倒发作，或觉得要晕倒似的",r:false},
  {id:13,t:"我吸气呼气都感到很容易",r:true},
  {id:14,t:"我手脚麻木和刺痛",r:false},
  {id:15,t:"我因为胃痛和消化不良而苦恼",r:false},
  {id:16,t:"我常常要小便",r:false},
  {id:17,t:"我的手常常是干燥温暖的",r:true},
  {id:18,t:"我脸红发热",r:false},
  {id:19,t:"我容易入睡并且一夜睡得很好",r:true},
  {id:20,t:"我做噩梦",r:false}
];
const OT = ["没有/很少","小部分时间","相当多时间","绝大部分/全部时间"];
const OL = ["A","B","C","D"];
const TOTAL = QS.length;
const A = {};
let cur = 0; // current index (0-based)

function showQ() {
  const q = QS[cur];
  const area = document.getElementById("qArea");
  area.style.display = "block";
  // Re-trigger animation
  area.style.animation = "none";
  area.offsetHeight;
  area.style.animation = "slideIn .3s ease";

  const card = document.getElementById("qCard");
  card.className = "q-card" + (q.r ? " rev" : "");

  document.getElementById("qNum").textContent = q.id;
  document.getElementById("qText").innerHTML = q.t + (q.r ? '<span class="rev-tag">反向题</span>' : "");

  const optsEl = document.getElementById("qOpts");
  optsEl.innerHTML = OL.map((l, i) => {
    const sel = A[q.id] === (i + 1) ? " sel" : "";
    return `<div class="opt${sel}" onclick="pick(${q.id},${i+1},this)">
      <div class="o-letter">${l}</div><div class="o-text">${OT[i]}</div>
    </div>`;
  }).join("");

  // Progress
  const answered = Object.keys(A).length;
  document.getElementById("pText").textContent = `${cur + 1} / ${TOTAL}`;
  document.getElementById("pFill").style.width = (answered / TOTAL * 100) + "%";

  // Nav buttons
  document.getElementById("btnPrev").disabled = cur === 0;
  const btnNext = document.getElementById("btnNext");
  const navCenter = document.getElementById("navCenter");

  if (cur === TOTAL - 1) {
    // Last question
    btnNext.textContent = "查看结果";
    btnNext.className = "nav-btn nav-submit";
    btnNext.disabled = answered < TOTAL;
    navCenter.textContent = answered < TOTAL ? `还有 ${TOTAL - answered} 题未答` : "全部完成";
  } else {
    btnNext.textContent = "下一题 →";
    btnNext.className = "nav-btn nav-next";
    btnNext.disabled = false;
    navCenter.textContent = "";
  }
}

function pick(id, v, el) {
  const optsEl = document.getElementById("qOpts");
  optsEl.querySelectorAll(".opt").forEach(o => o.classList.remove("sel"));
  el.classList.add("sel");
  A[id] = v;
  // Update progress
  const answered = Object.keys(A).length;
  document.getElementById("pFill").style.width = (answered / TOTAL * 100) + "%";
  document.getElementById("pText").textContent = `${cur + 1} / ${TOTAL}`;

  // If last question, update button state & show unanswered
  if (cur === TOTAL - 1) {
    document.getElementById("btnNext").disabled = answered < TOTAL;
    document.getElementById("navCenter").textContent = answered < TOTAL ? `还有 ${TOTAL - answered} 题未答` : "全部完成";
    updateUnanswered();
  } else {
    // Auto advance after a short delay
    setTimeout(() => { if (A[id] === v && cur < TOTAL - 1) { cur++; showQ(); } }, 400);
  }
}

function updateUnanswered() {
  const missing = [];
  for (let i = 0; i < TOTAL; i++) { if (A[QS[i].id] === undefined) missing.push(i); }
  const el = document.getElementById("unanswered");
  const list = document.getElementById("uaList");
  if (missing.length > 0) {
    el.style.display = "block";
    list.innerHTML = missing.map(i => `<span class="ua-item" onclick="jumpTo(${i})">第${i+1}题</span>`).join("");
  } else {
    el.style.display = "none";
  }
}

function jumpTo(idx) { cur = idx; showQ(); window.scrollTo({top:0,behavior:"smooth"}); }

function goPrev() {
  if (cur > 0) { cur--; showQ(); window.scrollTo({top:0,behavior:"smooth"}); }
}

function goNext() {
  if (cur < TOTAL - 1) {
    cur++; showQ(); window.scrollTo({top:0,behavior:"smooth"});
  } else {
    // Last question, check if all answered
    if (Object.keys(A).length === TOTAL) showResult();
  }
}

function showResult() {
  let raw = 0;
  QS.forEach(q => { const v = A[q.id]; raw += q.r ? (5 - v) : v; });
  const std = Math.round(raw * 1.25);
  let lev, color, desc;
  if (std < 50) { lev = "正常范围"; color = "#34D399"; desc = "您的焦虑自评得分在正常范围内，目前没有明显的焦虑症状。请继续保持良好的心态和健康的生活方式。"; }
  else if (std < 60) { lev = "轻度焦虑"; color = "#FBBF24"; desc = "您可能存在轻度焦虑情绪。建议关注自身情绪变化，适当进行放松训练、运动和社交活动。如症状持续或加重，建议寻求专业帮助。"; }
  else if (std < 70) { lev = "中度焦虑"; color = "#F97316"; desc = "您可能存在中度焦虑症状，这可能已影响到日常生活和工作。建议尽早前往医院精神科或心理科进行专业评估。"; }
  else { lev = "重度焦虑"; color = "#EF4444"; desc = "您可能存在重度焦虑症状，强烈建议您尽快前往正规医院精神科或心理科就诊，由专业医师进行系统评估和治疗。"; }

  document.getElementById("qArea").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";
  document.getElementById("resSection").style.display = "block";

  document.getElementById("scNum").textContent = std;
  document.getElementById("scNum").style.color = color;
  document.getElementById("resLevel").textContent = lev;
  document.getElementById("resLevel").style.color = color;
  document.getElementById("resDesc").textContent = desc;
  document.getElementById("dRaw").textContent = raw + " 分";
  document.getElementById("dStd").textContent = std + " 分";
  document.getElementById("dLev").textContent = lev;
  document.getElementById("dLev").style.color = color;

  const circ = document.getElementById("sCircle");
  circ.style.stroke = color;
  const pct = Math.min(Math.max((std - 25) / 75, 0), 1);
  setTimeout(() => { circ.style.transition = "stroke-dashoffset 1s ease"; circ.style.strokeDashoffset = 408.4 * (1 - pct); }, 50);
}

function restart() {
  Object.keys(A).forEach(k => delete A[k]);
  cur = 0;
  document.getElementById("resSection").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "block";
  const c = document.getElementById("sCircle"); c.style.transition = "none"; c.style.strokeDashoffset = 408.4;
  showQ();
  window.scrollTo({top:0,behavior:"smooth"});
}

showQ();
</script>
</body>
</html>
